            {[7.4,6.8,7.1,6.0,5.9,6.4,6.3,6.6,6.0,5.8,6.4,6.5,6.2,6.4].map((h,i)=>(
              <i key={i} style={{height:h*7+'px', opacity: i<7 ? 0.4 : 1}}/>
            ))}
          </div>
          <div className="bay-stats">
            <div><div className="bs-k">7d Avg</div><div className="bs-v">6h36<small></small></div></div>
            <div><div className="bs-k">HRV</div><div className="bs-v">48<small>ms ↓6</small></div></div>
            <div><div className="bs-k">RHR</div><div className="bs-v">58<small>bpm ↑4</small></div></div>
          </div>
          <a className="bay-cta">
            <div>
              Enter Recovery Bay
              <div className="bay-cta-sub" style={{fontSize:10, marginTop:2}}>Lights out 23:00 tonight</div>
            </div>
            <span className="arrow">→</span>
          </a>
        </div>

        <div className="bay body">
          <div className="bay-num"><span className="swatch"></span>Bay 03・Body</div>
          <div className="bay-h serif">Composition <em>holding</em>.</div>
          <div className="bay-deck">
            67.8kg・BF 17.5%・lean 55.9kg. Recomp staying on track —
            fat down 0.6kg over 30 days, muscle held. Don't let noise derail the week.
          </div>
          <div className="bay-chart">
            {[68.5,68.3,68.1,67.9,67.8,67.7,67.6,67.5,67.4,67.3,67.5,67.6,67.7,67.8].map((h,i)=>(
              <i key={i} style={{height:(h-72)*30+'px', opacity: i<7 ? 0.4 : 1}}/>
            ))}
          </div>
          <div className="bay-stats">
            <div><div className="bs-k">Muscle</div><div className="bs-v">61.2<small>kg</small></div></div>
            <div><div className="bs-k">BMR</div><div className="bs-v">1,612<small>kcal</small></div></div>
            <div><div className="bs-k">30d</div><div className="bs-v">↓ 0.6<small>kg</small></div></div>
          </div>
          <a className="bay-cta">
            <div>
              Enter Body Bay
              <div className="bay-cta-sub" style={{fontSize:10, marginTop:2}}>Protein floor 180g today</div>
            </div>
            <span className="arrow">→</span>
          </a>
        </div>
      </div>

      {/* RISK + PULSE BAND */}
      <div className="band">
        <div>
          <div className="band-h"><span>Risk queue・things that could wreck this week</span><span>3 open</span></div>
          <div className="risk-list">
            <div className="risk-item">
              <div className="risk-num hold serif">01</div>
              <div>
                <div className="risk-h">Under-recovered, 3-night slide.</div>
                <div className="risk-d">3 of the last 4 nights had less than 1 hour of deep sleep. Forcing intensity today only deepens the deficit.</div>
              </div>
              <div className="risk-meta"><b>Hold</b>readiness ↓12<br/>next・lights out 23:00</div>
            </div>
            <div className="risk-item">
              <div className="risk-num act serif">02</div>
              <div>
                <div className="risk-h">Push : Leg imbalance widening.</div>
                <div className="risk-d">Push accounts for 52% of 7-day volume, legs just 18%. Last Friday logged patellar tracking drift.</div>
              </div>
              <div className="risk-meta"><b>Act</b>ppl-log・MEV<br/>next・leg-priority week</div>
            </div>
            <div className="risk-item">
              <div className="risk-num watch serif">03</div>
              <div>
                <div className="risk-h">Resting HR drifting +4bpm.</div>
                <div className="risk-d">Often a precursor to illness or under-recovery. Recheck 04-26; if it persists, go deeper with a deload.</div>
              </div>
              <div className="risk-meta"><b>Watch</b>garmin・7d trend<br/>next・recheck 04-26</div>
            </div>
          </div>
        </div>

        <div>
          <div className="band-h"><span>Training pulse・last 28 days</span><span>push 14・pull 8・legs 4・rest 2</span></div>
          <div className="pulse-28">
            {(() => {
              const seq = ['rest','push','pull','legs','push','pull','rest','push','push','pull','legs','push','pull','rest','push','push','pull','legs','push','pull','rest','push','push','pull','rest','push','legs','rest'];
              return seq.map((t,i)=>(
                <div key={i} className={`pc ${t} ${i===27?'today':''}`} title={t}/>
              ));
            })()}
          </div>
          <div className="pulse-axis">
            <span>28d ago</span>
            <span>21d</span>
            <span>14d</span>
            <span>7d</span>
            <span>Today</span>
          </div>
          <div className="pulse-legend">
            <span><span className="sw" style={{background:'var(--orange)'}}></span>Push</span>
            <span><span className="sw" style={{background:'var(--green)'}}></span>Pull</span>
            <span><span className="sw" style={{background:'var(--warm)'}}></span>Legs</span>
            <span><span className="sw" style={{background:'rgba(26,24,20,.08)'}}></span>Rest</span>
          </div>
          <div className="pulse-totals">
            <div><div className="pk">Sessions</div><div className="pv serif">26</div></div>
            <div><div className="pk">Total sets</div><div className="pv serif">478</div></div>
            <div><div className="pk">Daily avg</div><div className="pv serif">17.4</div></div>
            <div><div className="pk">vs prev 28d</div><div className="pv serif" style={{color:'var(--orange)'}}>+22%</div></div>
          </div>
        </div>
      </div>

      <div className="colophon">
        <span><b>Data・</b>garmin connect・withings body+・ppl-log.csv</span>
        <span><b>Generated・</b>2026-04-24 06:50 cst</span>
        <span><b>Cockpit・</b>v2026.04・hermes/codex rendered</span>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<GymBold />);
  </script>
